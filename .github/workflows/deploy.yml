# GitHub Actions - Notification Service CI/CD

name: Notification Service CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  SERVICE_NAME: 'notification-service'
  # Đường dẫn repo trên VPS Group 1: $VPS_APP_DIR/$SERVICE_PATH
  # Ví dụ: /opt/hakora/Hakora-Notification-Service
  SERVICE_PATH: 'Hakora-Notification-Service'

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - run: npm run lint --if-present
        continue-on-error: true
      - run: npm run build
        env:
          NODE_ENV: production

  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo SSH connection successful" || {
            echo "::error::SSH failed. Kiểm tra VPS_SSH_KEY và authorized_keys trên VPS Group 1."
            exit 1
          }

      - name: Deploy
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          APP_DIR="${{ secrets.VPS_APP_DIR }}"
          SERVICE_PATH="${{ secrets.VPS_NOTIFICATION_PATH }}"
          if [ -z "$SERVICE_PATH" ]; then SERVICE_PATH="${{ env.SERVICE_PATH }}"; fi
          if [ -z "$APP_DIR" ]; then
            echo "Missing secret VPS_APP_DIR (e.g. /opt/hakora)"
            exit 1
          fi
          ssh -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << ENDSSH
            set -ex
            DEPLOY_DIR="${APP_DIR}/${SERVICE_PATH}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH}"
            echo ">>> Deploy dir: \${DEPLOY_DIR} branch: \${DEPLOY_BRANCH}"
            cd "\${DEPLOY_DIR}"
            if [ ! -d .git ]; then
              echo "ERROR: Không có .git — clone repo trên VPS trước:"
              echo "  git clone <repo-url> \${DEPLOY_DIR}"
              exit 1
            fi
            echo ">>> git fetch..."
            git fetch origin "\${DEPLOY_BRANCH}" || {
              echo "ERROR: git fetch fail — thêm Deploy Key trên VPS"
              exit 1
            }
            git reset --hard "origin/\${DEPLOY_BRANCH}"
            echo ">>> npm install..."
            npm ci --legacy-peer-deps || npm install --legacy-peer-deps
            echo ">>> build..."
            npm run build
            # Migration chạy thủ công trên VPS (npm run migration:run)
            echo ">>> pm2..."
            if pm2 describe ${{ env.SERVICE_NAME }} >/dev/null 2>&1; then
              pm2 restart ${{ env.SERVICE_NAME }}
            else
              pm2 start npm --name ${{ env.SERVICE_NAME }} -- run start:prod
            fi
            pm2 save
            pm2 status
            echo ">>> Done: ${{ env.SERVICE_NAME }}"
          ENDSSH
